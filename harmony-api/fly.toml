# Harmony API — Fly.io deployment configuration
# Deploy: fly deploy
# Logs: fly logs
# Status: fly status

app = "harmony-api"
primary_region = "cdg"  # Paris — closest to Supabase eu-west-3

[build]
  dockerfile = "Dockerfile"

[env]
  SERVER_PORT = "3000"
  ENVIRONMENT = "production"
  RUST_LOG = "info,harmony_api=info"
  # Adult-NSFW image classifier (Phase 2). The ONNX model is bundled by the
  # Dockerfile at /app/models/nsfw.onnx. If the model is missing/invalid the API
  # logs an error and falls back to the Noop classifier (images auto-approve);
  # CSAM detection is a separate matcher and is unaffected.
  NSFW_CLASSIFIER_ENABLED = "true"
  NSFW_MODEL_PATH = "/app/models/nsfw.onnx"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

# WHY: Rolling deploys — zero downtime. New instance starts, health-checks,
# then old instance is stopped. Same behavior as Kubernetes rolling update.
[[http_service.checks]]
  interval = "10s"
  timeout = "2s"
  grace_period = "10s"
  method = "GET"
  path = "/health"

[deploy]
  strategy = "rolling"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
