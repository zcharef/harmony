# cargo-deny configuration for harmony-api
# https://embarkstudios.github.io/cargo-deny/
#
# Run: cargo deny check

[graph]
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
]

# ============================================================================
# ADVISORIES - Check for known security vulnerabilities
# ============================================================================
[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
ignore = [
    # WHY: Transitive dep from jsonwebtoken → rsa. No upstream fix available (RUSTSEC-2023-0071).
    # We do not use RSA directly for key exchange — jsonwebtoken uses it for JWT RS256 validation.
    # Risk is mitigated: tokens are short-lived (1h) and validated server-side only.
    "RUSTSEC-2023-0071",
]

# ============================================================================
# LICENSES - Ensure all dependencies have acceptable licenses
# ============================================================================
[licenses]
confidence-threshold = 0.8
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "MPL-2.0",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "BSL-1.0",
    "0BSD",
    "CDLA-Permissive-2.0",
]

# Copyleft licenses - deny by default for production code
# These would require us to open-source the entire application

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[[licenses.clarify]]
name = "webpki"
expression = "ISC"
license-files = [{ path = "LICENSE", hash = 0x001c7e6c }]

[licenses.private]
ignore = true
registries = []

# ============================================================================
# BANS - Deny specific crates or features
# ============================================================================
[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"

# Crates to deny entirely
deny = [
    # Unmaintained / known issues
    # WHY: openssl-sys removed from wrappers — it's no longer a transitive dep
    # after switching to rustls. Keeping native-tls as a safety net.
    { name = "openssl", wrappers = ["native-tls"] },

    # Deprecated crates
    { name = "failure" },
    { name = "error-chain" },
    { name = "quickersort" },
    { name = "term" },

    # Security concerns
    { name = "rust-crypto" },

    # Mock crates — use real implementations or fakes, not mocks
    { name = "mockall" },
    { name = "mock_derive" },
]

# Allow specific duplicates when necessary
skip = [
    # Skip duplicate version checks for these (transitive deps often lag)
]

skip-tree = [
    # Skip entire dependency trees for build-only deps
]

# ============================================================================
# SOURCES - Ensure dependencies come from trusted sources
# ============================================================================
[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]

[sources.allow-org]
github = []
