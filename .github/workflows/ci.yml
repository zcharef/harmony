# Harmony CI/CD — Quality Wall + E2E Tests + Deploy
#
# CI: 3 parallel jobs (app wall ~30s, Rust wall ~60s, E2E ~3min)
# CD: On push to main, deploys API to Fly.io + SPA to Cloudflare Pages

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Job 1: App Quality Wall (~30s)
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  app-quality:
    name: App Quality Wall
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: harmony-app

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: harmony-app/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate API client from OpenAPI spec
        run: pnpm gen:api

      - name: Biome lint
        run: pnpm lint

      - name: TypeScript check
        run: pnpm typecheck

      - name: Module boundaries
        run: pnpm lint:boundaries

      - name: Circular dependencies
        run: pnpm circular

      - name: Architecture tests
        run: pnpm test:arch

      - name: Dead code check (Knip)
        run: pnpm knip

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Job 2: Rust Quality Wall (~60s)
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  rust-quality:
    name: Rust Quality Wall
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: harmony-api

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: harmony_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: harmony-api

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Security audit
        # WHY ignore: RUSTSEC-2023-0071 is in `rsa` via `sqlx-mysql` (transitive). We only use Postgres. No fix available.
        run: |
          cargo install cargo-audit --locked 2>/dev/null || true
          cargo audit --ignore RUSTSEC-2023-0071

      - name: Run tests
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/harmony_test
          SUPABASE_JWT_SECRET: super-secret-jwt-token-with-at-least-32-characters-long
          SUPABASE_URL: http://localhost:9999
          ENVIRONMENT: test
          SERVER_PORT: "3000"
        run: cargo test --all-targets

      - name: OpenAPI freshness check
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/harmony_test
          SUPABASE_JWT_SECRET: super-secret-jwt-token-with-at-least-32-characters-long
          SUPABASE_URL: http://localhost:9999
          ENVIRONMENT: test
          SERVER_PORT: "3000"
        run: |
          cargo run --bin export_openapi > /tmp/openapi-fresh.json
          diff -u openapi.json /tmp/openapi-fresh.json || {
            echo "openapi.json is stale. Run just export-openapi and commit."
            exit 1
          }

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Job 3: E2E Tests (~3min)
  # WHY Supabase Cloud: dedicated CI project avoids Docker-in-Docker overhead.
  # supabase db push applies pending migrations. Test data uses unique IDs
  # so accumulation doesn't cause conflicts.
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [app-quality, rust-quality]

    steps:
      - uses: actions/checkout@v4

      # ── Node / pnpm ──────────────────────────────────────
      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: harmony-app/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: harmony-app
        run: pnpm install --frozen-lockfile

      - name: Install Playwright (chromium only)
        working-directory: harmony-app
        run: npx playwright install --with-deps chromium

      # ── Rust toolchain ───────────────────────────────────
      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: harmony-api

      # ── Supabase Cloud: apply pending migrations ─────────
      # WHY: Dedicated CI Supabase Cloud project. supabase db push
      # applies any new migrations without destroying existing data.
      # Test data uses unique IDs so accumulation is safe.
      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase CI project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          CI_SUPABASE_PROJECT_REF: ${{ secrets.CI_SUPABASE_PROJECT_REF }}
        run: supabase link --project-ref "$CI_SUPABASE_PROJECT_REF"

      - name: Push pending migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase db push

      # ── Build & start Rust API ───────────────────────────
      # WHY: API runs locally in the CI runner, connects to Cloud Supabase.
      - name: Build Rust API
        working-directory: harmony-api
        env:
          DATABASE_URL: ${{ secrets.CI_SUPABASE_DB_URL }}
          SUPABASE_JWT_SECRET: ${{ secrets.CI_SUPABASE_JWT_SECRET }}
          SUPABASE_URL: ${{ secrets.CI_SUPABASE_URL }}
          ENVIRONMENT: test
          SERVER_PORT: "3000"
        run: cargo build --release

      - name: Start Rust API (background)
        working-directory: harmony-api
        env:
          DATABASE_URL: ${{ secrets.CI_SUPABASE_DB_URL }}
          SUPABASE_JWT_SECRET: ${{ secrets.CI_SUPABASE_JWT_SECRET }}
          SUPABASE_URL: ${{ secrets.CI_SUPABASE_URL }}
          ENVIRONMENT: test
          SERVER_PORT: "3000"
        run: ./target/release/harmony-api &

      # ── Start Vite dev server ────────────────────────────
      - name: Start Vite dev server (background)
        working-directory: harmony-app
        env:
          VITE_API_URL: http://localhost:3000
          VITE_SUPABASE_URL: ${{ secrets.CI_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.CI_SUPABASE_ANON_KEY }}
          VITE_TURNSTILE_SITE_KEY: ${{ secrets.TURNSTILE_SITE_KEY }}
        run: pnpm dev &

      # ── Wait for services ────────────────────────────────
      - name: Wait for API and Vite to be ready
        run: |
          echo "Waiting for Rust API..."
          timeout 60 bash -c 'until curl -sf http://localhost:3000/health; do sleep 1; done'
          echo "Waiting for Vite dev server..."
          timeout 60 bash -c 'until curl -sf http://localhost:1420; do sleep 1; done'
          echo "All services ready."

      # ── Run E2E tests ────────────────────────────────────
      - name: Run Playwright E2E tests
        working-directory: harmony-app
        env:
          CI_SUPABASE_URL: ${{ secrets.CI_SUPABASE_URL }}
          CI_SUPABASE_ANON_KEY: ${{ secrets.CI_SUPABASE_ANON_KEY }}
          CI_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.CI_SUPABASE_SERVICE_ROLE_KEY }}
        run: npx playwright test --retries=1 --fail-on-flaky-tests

      # ── Artifacts (on failure only) ──────────────────────
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: harmony-app/playwright-report/
          retention-days: 14

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: harmony-app/test-results/
          retention-days: 14

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Job 4: Deploy API to Fly.io (only on push to main, after E2E passes)
  # WHY: Rolling deploy — zero downtime. Fly.io starts new instance,
  # health-checks it, then stops the old one.
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  deploy-api:
    name: Deploy API (Fly.io)
    runs-on: ubuntu-latest
    needs: [e2e-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        working-directory: harmony-api
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --remote-only

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Job 5: Deploy SPA to Cloudflare Pages (only on push to main)
  # WHY: Static SPA build deployed to Cloudflare's global edge network.
  # app.joinharmony.app serves the React app.
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  deploy-spa:
    name: Deploy SPA (Cloudflare Pages)
    runs-on: ubuntu-latest
    needs: [e2e-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: harmony-app/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: harmony-app
        run: pnpm install --frozen-lockfile

      - name: Build production SPA
        working-directory: harmony-app
        env:
          VITE_API_URL: https://api.joinharmony.app
          VITE_SUPABASE_URL: ${{ secrets.PROD_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.PROD_SUPABASE_ANON_KEY }}
          VITE_TURNSTILE_SITE_KEY: ${{ secrets.PROD_TURNSTILE_SITE_KEY }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
        run: pnpm build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy harmony-app/dist --project-name=harmony-app --branch=main
