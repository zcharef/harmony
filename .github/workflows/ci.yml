name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust-quality:
    name: Rust Quality Wall
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: harmony-api

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: harmony_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94"
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: harmony-api

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/harmony_test
          SUPABASE_JWT_SECRET: test-secret-with-at-least-32-characters-long-for-ci
          SUPABASE_URL: http://localhost:9999
          ENVIRONMENT: test
          SERVER_PORT: "3000"
        run: cargo test --all-targets

      - name: OpenAPI freshness check
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/harmony_test
          SUPABASE_JWT_SECRET: test-secret-with-at-least-32-characters-long-for-ci
          SUPABASE_URL: http://localhost:9999
          ENVIRONMENT: test
          SERVER_PORT: "3000"
        run: |
          cargo run --bin export_openapi > /tmp/openapi-fresh.json
          diff -u openapi.json /tmp/openapi-fresh.json || (echo "ERROR: openapi.json is stale. Run 'just export-openapi' and commit." && exit 1)

  rust-security:
    name: Rust Security Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: harmony-api
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94"
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: Check licenses and bans
        run: cargo deny check

      - name: Audit dependencies for vulnerabilities
        run: |
          cargo install cargo-audit --locked || true
          cargo audit

  app-quality:
    name: App Quality Wall
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: harmony-app

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: harmony-app/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Biome lint
        run: pnpm lint

      - name: TypeScript check
        run: pnpm typecheck

      - name: Module boundaries
        run: pnpm lint:boundaries

      - name: Circular dependencies
        run: pnpm circular

      - name: Architecture tests
        run: pnpm test:arch

      - name: Dead code check
        run: pnpm knip

      - name: Generated TypeScript client compiles
        run: |
          pnpm run gen:api
          pnpm tsc --noEmit

  migration-quality:
    name: Migration Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint migrations
        run: |
          chmod +x scripts/lint-migrations.sh
          ./scripts/lint-migrations.sh

      - name: Check ADR index freshness
        run: |
          chmod +x scripts/check-adr-index.sh
          ./scripts/check-adr-index.sh

  commit-quality:
    name: Commit Message Lint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: harmony-app/pnpm-lock.yaml

      - name: Install commitlint
        working-directory: ./harmony-app
        run: pnpm install --frozen-lockfile

      - name: Validate commit messages
        working-directory: ./harmony-app
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: npx commitlint --from "$BASE_SHA" --to "$HEAD_SHA"

  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [rust-quality, app-quality]

    steps:
      - uses: actions/checkout@v4

      # ── Node / pnpm ──────────────────────────────────────────────
      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: harmony-app/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: harmony-app
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: harmony-app
        run: npx playwright install --with-deps chromium

      # ── Rust toolchain ───────────────────────────────────────────
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94"

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: harmony-api

      # ── Supabase CLI ─────────────────────────────────────────────
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: npx supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Reset E2E database (clean slate)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: npx supabase db reset --linked

      # ── Start services ───────────────────────────────────────────
      - name: Build Rust API
        working-directory: harmony-api
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
          SUPABASE_JWT_SECRET: ${{ secrets.SUPABASE_JWT_SECRET }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          ENVIRONMENT: test
          SERVER_PORT: "3000"
        run: cargo build --release

      - name: Start Rust API (background)
        working-directory: harmony-api
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
          SUPABASE_JWT_SECRET: ${{ secrets.SUPABASE_JWT_SECRET }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          ENVIRONMENT: test
          SERVER_PORT: "3000"
        run: ./target/release/harmony-api &

      - name: Start Vite dev server (background)
        working-directory: harmony-app
        env:
          VITE_API_URL: http://localhost:3000
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          VITE_TURNSTILE_SITE_KEY: "1x00000000000000000000AA"
        run: pnpm dev &

      - name: Wait for services to be ready
        run: npx wait-on --timeout 60000 http://localhost:3000/health http://localhost:1420

      # ── Run E2E tests ────────────────────────────────────────────
      - name: Run Playwright E2E tests
        working-directory: harmony-app
        env:
          VITE_API_URL: http://localhost:3000
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VITE_TURNSTILE_SITE_KEY: "1x00000000000000000000AA"
        run: npx playwright test --fail-on-flaky-tests

      # ── Artifacts ────────────────────────────────────────────────
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: harmony-app/playwright-report/
          retention-days: 14

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: harmony-app/test-results/
          retention-days: 14
