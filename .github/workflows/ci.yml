# Harmony CI — Quality Wall (Tier 1: No Secrets Required)
#
# Runs on ALL pull requests including forks.
# These checks do NOT require secrets — safe for untrusted code.
# E2E tests and deploys are in e2e-deploy.yml (Tier 2).

name: CI

permissions: {}

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Gate: detect which paths changed so downstream jobs can skip when irrelevant
  # WHY: A frontend-only PR should not wait for Rust compilation, and vice versa.
  # Push to main always runs everything (empty filter outputs default to true).
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      app: ${{ steps.filter.outputs.app }}
      api: ${{ steps.filter.outputs.api }}
      tauri: ${{ steps.filter.outputs.tauri }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            app:
              - 'harmony-app/src/**'
              - 'harmony-app/public/**'
              - 'harmony-app/index.html'
              - 'harmony-app/package.json'
              - 'harmony-app/pnpm-lock.yaml'
              - 'harmony-app/tsconfig*.json'
              - 'harmony-app/vite.config.*'
              - 'harmony-app/vitest.config.*'
              - 'harmony-app/biome.json'
              - 'harmony-app/eslint.config.*'
              - 'harmony-app/openapi-ts.config.*'
              - 'harmony-api/openapi.json'
              - '.github/workflows/ci.yml'
            api:
              - 'harmony-api/src/**'
              - 'harmony-api/tests/**'
              - 'harmony-api/Cargo.toml'
              - 'harmony-api/Cargo.lock'
              - 'harmony-api/.sqlx/**'
              - 'harmony-api/openapi.json'
              - 'harmony-api/deny.toml'
              - 'supabase/**'
              - '.github/workflows/ci.yml'
            tauri:
              - 'harmony-app/src-tauri/**'
              - '.github/workflows/ci.yml'

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Job 1: App Quality Wall
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  app-quality:
    name: App Quality Wall
    needs: changes
    if: needs.changes.outputs.app == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: harmony-app

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: harmony-app/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate API client from OpenAPI spec
        run: pnpm gen:api

      - name: Biome lint
        run: pnpm lint

      - name: TypeScript check
        run: pnpm typecheck

      - name: Module boundaries
        run: pnpm lint:boundaries

      - name: Circular dependencies
        run: pnpm circular

      - name: Unit tests (Vitest)
        run: pnpm test

      - name: Architecture tests
        run: pnpm test:arch

      - name: Dead code check (Knip)
        run: pnpm knip

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Job 2: Rust API Quality Wall
  # Unit tests use SQLX_OFFLINE=true with .sqlx/ cache (no Postgres needed).
  # Integration tests (voice_endpoint_test) connect to CI Supabase Postgres.
  # WHY fail-fast ordering: fmt (<1s) → clippy (compile) → openapi (reuses
  # clippy build, near-instant) → tests (slowest, most informative last).
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  rust-quality:
    name: Rust API Quality Wall
    needs: changes
    if: needs.changes.outputs.api == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: harmony-api
    env:
      SQLX_OFFLINE: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: harmony-api
          shared-key: harmony-api

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      # WHY here: clippy already compiled everything, so cargo run only links (~1s).
      # Catches stale openapi.json before waiting for the full test suite.
      - name: OpenAPI freshness check
        env:
          DATABASE_URL: postgres://unused:unused@localhost/unused
          SUPABASE_JWT_SECRET: super-secret-jwt-token-with-at-least-32-characters-long
          SUPABASE_URL: http://localhost:9999
          ENVIRONMENT: test
          SERVER_PORT: "3000"
        run: |
          RUST_LOG=error cargo run --bin export_openapi > /tmp/openapi-fresh.json
          diff -u openapi.json /tmp/openapi-fresh.json || {
            echo "openapi.json is stale. Run just export-openapi and commit."
            exit 1
          }

      - name: Run unit + arch tests
        env:
          DATABASE_URL: postgres://unused:unused@localhost/unused
          SUPABASE_JWT_SECRET: super-secret-jwt-token-with-at-least-32-characters-long
          SUPABASE_URL: http://localhost:9999
          ENVIRONMENT: test
          SERVER_PORT: "3000"
        run: cargo test --all-targets

      # WHY separate step: integration tests hit real CI Supabase Postgres.
      # Unit tests above use dummy env vars + SQLX_OFFLINE for speed.
      - name: Run integration tests
        env:
          DATABASE_URL: ${{ secrets.CI_SUPABASE_DB_URL }}
          SUPABASE_JWT_SECRET: ${{ secrets.CI_SUPABASE_JWT_SECRET }}
          SUPABASE_URL: ${{ secrets.CI_SUPABASE_URL }}
          ENVIRONMENT: test
          SERVER_PORT: "3000"
        run: cargo test --test voice_endpoint_test -- --ignored

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Job 3: Rust Security & License Audit
  # WHY separate: cargo-audit and cargo-deny only read Cargo.lock — no
  # compilation needed. Runs in parallel with rust-quality instead of
  # waiting behind a 5-min compile.
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  rust-security:
    name: Rust Security & License
    needs: changes
    if: needs.changes.outputs.api == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: harmony-api

    steps:
      - uses: actions/checkout@v4

      - uses: taiki-e/install-action@v2.71.1
        with:
          tool: cargo-audit,cargo-deny

      - name: Security audit
        # WHY ignore: RUSTSEC-2023-0071 is in `rsa` via `sqlx-mysql` (transitive). We only use Postgres. No fix available.
        run: cargo audit --ignore RUSTSEC-2023-0071

      - name: License & crate compliance
        run: cargo deny check

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Job 4: Tauri Crypto Quality Wall
  # WHY separate: requires apt-get install of GTK/WebKit (~30-60s) and
  # compiles a different workspace (vodozemac, rusqlite). Splitting this
  # removes ~3-5 min from the API quality wall.
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  tauri-quality:
    name: Tauri Crypto Tests
    needs: changes
    if: needs.changes.outputs.tauri == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      # WHY separate shared-key: prevents cache thrashing with harmony-api.
      # Swatinem/rust-cache only saves on the first job that finishes — if both
      # jobs share a key, the faster one "wins" and the other recompiles from
      # scratch on the next run.
      - uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: harmony-app/src-tauri
          shared-key: harmony-tauri

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Tauri crypto tests
        working-directory: harmony-app/src-tauri
        run: cargo test --all-targets
