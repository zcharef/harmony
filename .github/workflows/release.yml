# Harmony Desktop Release — Build, Sign & Publish
#
# Triggered by pushing a version tag: git tag -a v0.2.0 -m "description" && git push origin v0.2.0
# Builds Tauri binaries for macOS (universal), Windows, and Linux.
# macOS: signed + notarized with Apple Developer Certificate.
# All platforms: signed with Tauri updater key for auto-updates.
# Uploads binaries + latest.json to a draft GitHub Release.

name: Release Desktop

permissions: {}

on:
  push:
    tags:
      - 'v*'

jobs:
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Version Guard — fail fast if tag doesn't match tauri.conf.json
  # WHY: Prevents releasing with wrong version in binary filenames.
  # Use `just release X.Y.Z` to keep all version sources in sync.
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  validate-version:
    name: Validate tag matches app version
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Compare tag version with tauri.conf.json
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          CONF=$(jq -r '.version' harmony-app/src-tauri/tauri.conf.json)
          if [ "$TAG" != "$CONF" ]; then
            echo "::error::Tag version ($TAG) != tauri.conf.json version ($CONF). Use 'just release $TAG' to bump."
            exit 1
          fi
          echo "Version match: $TAG"

  release:
    needs: [validate-version]
    permissions:
      contents: write
    environment: production
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS universal binary (Apple Silicon + Intel)
          - platform: macos-latest
            args: '--target universal-apple-darwin'
            rust_targets: 'aarch64-apple-darwin,x86_64-apple-darwin'
          # Linux
          - platform: ubuntu-22.04
            args: ''
            rust_targets: ''
          # Windows
          - platform: windows-latest
            args: ''
            rust_targets: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      # ── Node / pnpm ──────────────────────────────────────
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: harmony-app/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: harmony-app
        run: pnpm install --frozen-lockfile

      - name: Generate API client from OpenAPI spec
        working-directory: harmony-app
        run: pnpm gen:api

      # ── Rust ─────────────────────────────────────────────
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: |
            harmony-api
            harmony-app/src-tauri
          shared-key: harmony-release

      # WHY: Cache restore can overwrite target list. Ensure cross-compile target is present.
      - name: Add x86_64-apple-darwin target
        if: matrix.platform == 'macos-latest'
        run: rustup target add x86_64-apple-darwin

      # ── Windows: OpenSSL for sqlcipher ──────────────────
      # WHY: rusqlite's sqlcipher feature requires OpenSSL headers + libs at build time.
      # WHY vcpkg: Chocolatey OpenSSL package path is unpredictable. vcpkg is pre-installed
      # on GitHub runners and provides a consistent path.
      - name: Install OpenSSL (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          vcpkg install openssl:x64-windows-static-md
          echo "OPENSSL_DIR=$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows-static-md" >> $env:GITHUB_ENV

      # ── Linux system dependencies ───────────────────────
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      # ── macOS: import Apple Developer Certificate ───────
      - name: Import Apple Developer Certificate
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo $APPLE_CERTIFICATE | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain

      - name: Resolve signing identity
        if: matrix.platform == 'macos-latest'
        run: |
          CERT_INFO=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID Application")
          CERT_ID=$(echo "$CERT_INFO" | awk -F'"' '{print $2}')
          echo "APPLE_SIGNING_IDENTITY=$CERT_ID" >> $GITHUB_ENV

      # ── Build, sign & upload to GitHub Release ──────────
      - name: Build and release
        # WHY pinned: pre-1.0 semver allows breaking changes on minor bumps.
        # v0.6.x gets patch fixes only. Bump deliberately when tauri-action releases v0.7+.
        # NOTE: v0.6 tag is stale (points to v0.6.0). Pin to latest patch explicitly.
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Tauri updater signing (all platforms)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS code signing + notarization
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Frontend build env vars (Vite needs these during beforeBuildCommand)
          VITE_API_URL: https://api.joinharmony.app
          VITE_SUPABASE_URL: ${{ secrets.PROD_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.PROD_SUPABASE_ANON_KEY }}
          VITE_TURNSTILE_SITE_KEY: ${{ secrets.PROD_TURNSTILE_SITE_KEY }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_WEB_APP_URL: https://app.joinharmony.app
          # Rust binary reads SENTRY_DSN at compile time via option_env!()
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_ENVIRONMENT: production
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Harmony ${{ github.ref_name }}'
          releaseBody: 'See assets below to download and install.'
          releaseDraft: true
          prerelease: false
          projectPath: harmony-app
          tauriScript: pnpm tauri
          args: ${{ matrix.args }}

      - name: Cleanup Apple signing artifacts
        if: always() && matrix.platform == 'macos-latest'
        run: |
          rm -f certificate.p12
          security delete-keychain build.keychain 2>/dev/null || true

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Fix updater signatures — reconcile latest.json with actual .sig files
  #
  # WHY: tauri-action@v0.6 generates latest.json with a stale signature for
  # macOS universal builds. The action signs the single-arch build first,
  # writes that signature to latest.json, then re-signs after lipo creates
  # the universal binary. The uploaded .sig file is correct but latest.json
  # still has the pre-lipo signature, causing "signature verification failed"
  # on macOS clients.
  #
  # This job reads each .sig asset, compares it to the latest.json entry,
  # and patches any mismatch. Idempotent: if tauri-action fixes this upstream,
  # signatures already match and the step becomes a no-op.
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  fix-updater-signatures:
    name: Fix updater signatures in latest.json
    needs: [release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Reconcile latest.json with .sig files
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          REPO="${GITHUB_REPOSITORY}"
          WORK=$(mktemp -d)

          gh release download "$TAG" --repo "$REPO" --dir "$WORK"

          # WHY: Pass $WORK via env var because heredoc stdin has no argv.
          export WORK_DIR="$WORK"
          python3 << 'SCRIPT' && CHANGED=no || CHANGED=yes
          import json, sys, os
          from pathlib import Path

          work = Path(os.environ["WORK_DIR"])
          latest = work / "latest.json"

          with open(latest) as f:
              data = json.load(f)

          fixed = 0
          for platform, info in data.get("platforms", {}).items():
              url = info.get("url", "")
              filename = url.rsplit("/", 1)[-1] if "/" in url else ""
              sig_file = work / f"{filename}.sig"

              if not sig_file.exists():
                  print(f"SKIP {platform}: no .sig file for {filename}")
                  continue

              actual_sig = sig_file.read_text().strip()
              current_sig = info.get("signature", "").strip()

              if current_sig == actual_sig:
                  print(f"  OK {platform}")
              else:
                  info["signature"] = actual_sig
                  fixed += 1
                  print(f" FIX {platform}: signature replaced")

          if fixed > 0:
              with open(latest, "w") as f:
                  json.dump(data, f, indent=2)
              print(f"\n{fixed} signature(s) patched")
          else:
              print("\nAll signatures match — no patch needed")

          # Exit code signals whether re-upload is needed
          sys.exit(0 if fixed == 0 else 42)
          SCRIPT

          if [ "$CHANGED" = "yes" ]; then
            gh release upload "$TAG" --repo "$REPO" --clobber "$WORK/latest.json"
            echo "✅ latest.json re-uploaded with corrected signatures"
          else
            echo "✅ All signatures already correct — no re-upload needed"
          fi
