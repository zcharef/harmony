# Harmony E2E & Deploy (Tier 2: Secrets Required)
#
# Triggers:
#   - push to main: runs E2E then deploys (continuous delivery)
#   - pull_request_target + "safe-to-test" label: runs E2E for fork PRs
#
# Security model:
#   pull_request_target runs the workflow YAML from the BASE branch (main),
#   not the PR branch — so attackers cannot modify the workflow itself.
#   The "safe-to-test" label is a maintainer gate: review the code BEFORE
#   adding the label, since the PR's code runs in the privileged
#   pull_request_target context (the E2E job itself uses no secrets — its
#   Supabase stack is ephemeral and in-runner — but the gate stays as
#   defense in depth and against runner abuse).
#   Only the "labeled" event type is allowed — after each new push, the
#   maintainer must re-apply the label to re-trigger, preventing abuse
#   via force-push after initial approval.
#   --frozen-lockfile prevents supply-chain attacks via lockfile manipulation.

name: E2E & Deploy

# Least-privilege: no permissions by default. Jobs declare what they need.
permissions: {}

on:
  # WHY workflow_run: E2E & Deploy must only run AFTER CI passes.
  # Without this, both workflows trigger in parallel on push to main,
  # and a deploy can go through even if CI lint/test/clippy fails.
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  pull_request_target:
    branches: [main]
    types: [labeled]

concurrency:
  # WHY ref not sha: pushes to main cancel superseded E2E runs to save runner
  # time. Each run gets its own ephemeral in-runner Supabase stack, so
  # concurrent runs cannot corrupt each other's state. PRs use their number.
  group: e2e-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # E2E Tests
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    # WHY: For workflow_run, only proceed if CI succeeded (not just completed).
    # For pull_request_target, check the safe-to-test label as before.
    if: >-
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
      || contains(github.event.pull_request.labels.*.name, 'safe-to-test')

    permissions:
      contents: read

    # WHY literal credentials: the whole E2E stack is an ephemeral in-runner
    # Supabase (`supabase start`). These are the deterministic supabase
    # local-dev demo credentials — the same defaults committed in
    # harmony-api/.env.example, harmony-app/.env.example and
    # harmony-app/e2e/fixtures/user-factory.ts. They are NOT secrets and only
    # exist for this runner's lifetime. (The previous shared "harmony-ci"
    # Supabase Cloud project auto-paused on the free tier and killed every
    # deploy — an in-runner stack cannot go stale.)
    env:
      # Rust API
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:64322/postgres
      SUPABASE_URL: http://127.0.0.1:64321
      SUPABASE_JWT_SECRET: super-secret-jwt-token-with-at-least-32-characters-long
      ENVIRONMENT: test
      SERVER_PORT: "3000"
      # WHY: The E2E suite seeds many messages as one test user; the flood
      # auto-mute (15/30s → 5-min mute) would intermittently 429 the seeding
      # and, with --retries=1 --fail-on-flaky-tests, freeze the whole deploy.
      # Anti-abuse heuristics have their own unit coverage; disable in E2E.
      SPAM_GUARD_ENABLED: "false"
      # Vite SPA
      VITE_API_URL: http://localhost:3000
      VITE_SUPABASE_URL: http://127.0.0.1:64321
      VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0
      # Cloudflare Turnstile "always passes" test site key — pairs with the
      # test secret in supabase/config.toml. Safe to commit.
      VITE_TURNSTILE_SITE_KEY: 1x00000000000000000000AA
      # Playwright fixtures (user-factory) — same local demo keys, explicit.
      CI_SUPABASE_URL: http://127.0.0.1:64321
      CI_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0
      CI_SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU

    steps:
      - uses: actions/checkout@v4
        with:
          # WHY: workflow_run provides the triggering commit via workflow_run.head_sha.
          # pull_request_target checks out the base branch by default — we need the PR's code.
          # Fallback to github.sha for direct push events.
          ref: ${{ github.event.workflow_run.head_sha || github.event.pull_request.head.sha || github.sha }}

      # ── Node / pnpm ──────────────────────────────────────
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: harmony-app/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: harmony-app
        run: pnpm install --frozen-lockfile

      # ── Playwright with browser cache ───────────────────
      # WHY version-specific key: the old key (hash of entire pnpm-lock.yaml)
      # invalidated the ~350MB browser cache on ANY dependency change. This key
      # only invalidates when Playwright itself is upgraded.
      - name: Get Playwright version
        id: pw-version
        working-directory: harmony-app
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ steps.pw-version.outputs.version }}

      - name: Install Playwright (chromium only)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: harmony-app
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        working-directory: harmony-app
        run: npx playwright install-deps chromium

      # ── Rust toolchain (shared cache from CI rust-quality job) ─
      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: harmony-api
          shared-key: harmony-api

      # ── Ephemeral Supabase stack (in-runner) ─────────────
      # WHY pinned: `latest` causes non-deterministic CI failures when Supabase
      # ships breaking changes. Bump deliberately via Dependabot or manually.
      - uses: supabase/setup-cli@v1.6.0
        with:
          version: 2.90.0

      # WHY in-runner: first start applies all migrations + seed.sql to a
      # fresh Postgres — self-contained, no cloud project to auto-pause, no
      # shared database for concurrent runs to race on.
      # WHY -x: E2E only needs Postgres + GoTrue + Kong (+ PostgREST). Realtime
      # was replaced by SSE (20260329190000_drop_realtime_publications.sql);
      # the rest are local-dev conveniences that only slow the runner down.
      # WHY before the API build: the API fetches the ES256 JWKS from
      # SUPABASE_URL at startup — the stack must be up before the API runs.
      - name: Start ephemeral Supabase stack
        run: supabase start -x studio,mailpit,imgproxy,edge-runtime,logflare,vector,supavisor,postgres-meta,realtime,storage-api

      # ── pgTAP database tests ────────────────────────────
      # WHY: RLS policies and CHECK constraints are security-critical.
      # WHY no flags: defaults to --local, connecting to the in-runner db as
      # postgres — full access to public and auth schemas, unlike the
      # restricted login role `--linked` used to create on the cloud project.
      - name: Run pgTAP database tests
        run: supabase test db

      # ── Build & start Rust API ───────────────────────────
      - name: Build Rust API
        working-directory: harmony-api
        env:
          SQLX_OFFLINE: "true"
        run: cargo build --release

      # API env (DATABASE_URL, SUPABASE_*) comes from the job-level env above.
      - name: Start Rust API (background)
        working-directory: harmony-api
        run: ./target/release/harmony-api > /tmp/api-stdout.log 2>&1 &

      # ── Generate API client (gitignored, must be regenerated) ─
      # WHY: src/lib/api/ is gitignored — generated from openapi.json.
      # Without this, every import from @/lib/api fails and Vite returns 500.
      - name: Generate API client from OpenAPI spec
        working-directory: harmony-app
        run: pnpm gen:api

      # ── Start Vite dev server ────────────────────────────
      # VITE_* env comes from the job-level env above.
      - name: Start Vite dev server (background)
        working-directory: harmony-app
        run: pnpm dev &

      # ── Wait for services ────────────────────────────────
      # WHY 3 attempts with restart: kept as cheap insurance against a slow
      # API cold start (pool acquisition, JWKS fetch). The restart loop reuses
      # the job-level env, so a restarted API is configured identically.
      - name: Wait for API and Vite to be ready
        run: |
          MAX_ATTEMPTS=3
          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            echo "Waiting for Rust API (attempt $attempt/$MAX_ATTEMPTS)..."
            if timeout 90 bash -c 'until curl -sf http://localhost:3000/health; do sleep 2; done'; then
              echo "API is healthy."
              break
            fi
            echo "::warning::API failed to start on attempt $attempt."
            cat /tmp/api-stdout.log
            if [ "$attempt" -lt "$MAX_ATTEMPTS" ]; then
              echo "Killing stale API process and restarting..."
              pkill -f harmony-api || true
              sleep 2
              cd harmony-api && ./target/release/harmony-api > /tmp/api-stdout.log 2>&1 &
              cd ..
            else
              echo "::error::API failed to start after $MAX_ATTEMPTS attempts."
              exit 1
            fi
          done
          echo "Waiting for Vite dev server..."
          timeout 90 bash -c 'until curl -sf http://localhost:1420; do sleep 2; done'
          echo "All services ready."

      # ── Smoke check: verify React app renders ────────────
      # WHY: The Vite health check only confirms the HTML shell is served.
      # If Zod env validation or Supabase init fails, the React app crashes
      # silently and all E2E tests timeout. This step catches that early.
      - name: Verify React app renders (smoke check)
        working-directory: harmony-app
        run: |
          npx playwright test --grep "should return 200 on health endpoint" --reporter=list 2>&1 || true
          echo "--- Smoke check: navigating to app root ---"
          # WHY --input-type=commonjs: harmony-app/package.json has "type": "module",
          # so Node.js 22 treats inline scripts as ESM by default. require() is only
          # available in CJS mode. --input-type forces CJS regardless of package.json.
          node --input-type=commonjs -e "
          const { chromium } = require('@playwright/test');
          (async () => {
            const browser = await chromium.launch();
            const page = await browser.newPage();
            const errors = [];
            page.on('pageerror', e => { console.error('PAGE ERROR:', e.message); errors.push(e.message); });
            page.on('console', msg => {
              const type = msg.type();
              const text = msg.text();
              if (type === 'error') { console.error('CONSOLE ERROR:', text); errors.push(text); }
              else if (type === 'warn') { console.warn('CONSOLE WARN:', text); }
            });
            try {
              await page.goto('http://localhost:1420', { waitUntil: 'networkidle', timeout: 30000 });
            } catch(e) {
              console.error('Navigation failed:', e.message);
            }
            const html = await page.content();
            console.log('Page title:', await page.title());
            console.log('HTML length:', html.length);
            console.log('Has #root:', html.includes('id=\"root\"'));
            console.log('First 1000 chars of body:', html.substring(html.indexOf('<body'), html.indexOf('<body') + 1000));
            await page.screenshot({ path: 'smoke-check.png' });
            console.log('Screenshot saved to smoke-check.png');
            await browser.close();
            if (errors.length > 0) {
              console.error('Total browser errors:', errors.length);
              // WHY: Don't fail the pipeline here — let the actual Playwright tests
              // run and report specific failures with traces/screenshots.
              console.warn('Smoke check detected errors. Continuing to Playwright tests for detailed diagnostics.');
            } else {
              console.log('Smoke check passed — no browser errors.');
            }
          })().catch(e => { console.error('Smoke check crashed:', e); process.exit(1); });
          "

      # ── Run E2E tests ────────────────────────────────────
      # CI_SUPABASE_* env (local demo keys) comes from the job-level env above.
      - name: Run Playwright E2E tests
        working-directory: harmony-app
        run: npx playwright test --retries=1 --fail-on-flaky-tests

      # ── Artifacts (on failure only) ──────────────────────
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: harmony-app/playwright-report/
          retention-days: 14

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: |
            harmony-app/test-results/
            harmony-app/smoke-check.png
          retention-days: 14

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Migrate Production DB (only on push to main, after E2E passes)
  # WHY: Schema must be up-to-date BEFORE new code deploys. If migration
  # fails, neither deploy proceeds — prevents schema/code drift.
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  migrate-production:
    name: Migrate Production DB
    runs-on: ubuntu-latest
    needs: [e2e-tests]
    if: github.event_name != 'pull_request_target' && (github.ref == 'refs/heads/main' || github.event.workflow_run.head_branch == 'main')
    environment: production
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      # WHY same pin as the E2E job: one CLI version across the pipeline.
      - uses: supabase/setup-cli@v1.6.0
        with:
          version: 2.90.0

      - name: Link production Supabase project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROD_SUPABASE_PROJECT_REF: ${{ secrets.PROD_SUPABASE_PROJECT_REF }}
        run: supabase link --project-ref "$PROD_SUPABASE_PROJECT_REF"

      - name: Push pending migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase db push

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Deploy API (only on push to main, after migrations applied)
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  deploy-api:
    name: Deploy API (Fly.io)
    runs-on: ubuntu-latest
    needs: [migrate-production]
    if: github.event_name != 'pull_request_target' && (github.ref == 'refs/heads/main' || github.event.workflow_run.head_branch == 'main')
    environment: production
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      # WHY pinned: @master is a supply-chain risk — any push to their repo
      # changes what runs in our production deploy pipeline.
      - uses: superfly/flyctl-actions/setup-flyctl@1.5

      - name: Deploy to Fly.io
        working-directory: harmony-api
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl deploy --remote-only

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Deploy SPA (only on push to main, after migrations applied)
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  deploy-spa:
    name: Deploy SPA (Cloudflare Pages)
    runs-on: ubuntu-latest
    needs: [migrate-production]
    if: github.event_name != 'pull_request_target' && (github.ref == 'refs/heads/main' || github.event.workflow_run.head_branch == 'main')
    environment: production
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: harmony-app/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: harmony-app
        run: pnpm install --frozen-lockfile

      - name: Generate API client from OpenAPI spec
        working-directory: harmony-app
        run: pnpm gen:api

      - name: Build production SPA
        working-directory: harmony-app
        env:
          VITE_API_URL: https://api.joinharmony.app
          VITE_SUPABASE_URL: ${{ secrets.PROD_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.PROD_SUPABASE_ANON_KEY }}
          VITE_TURNSTILE_SITE_KEY: ${{ secrets.PROD_TURNSTILE_SITE_KEY }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
        run: pnpm build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy harmony-app/dist --project-name=harmony-app --branch=main --commit-dirty=true --commit-message="${{ github.sha }}"
