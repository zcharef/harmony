server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Compress text assets — reduces transfer size for JS/CSS bundles
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml text/html;
    gzip_min_length 1024;

    # SPA fallback: unknown paths serve index.html (client-side router handles them)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy: forward all /v1/ requests to the Rust API.
    # proxy_buffering off + proxy_cache off are required for SSE (GET /v1/events)
    # so nginx does not buffer the chunked event stream.
    location /v1/ {
        proxy_pass http://harmony-api:3000;
        proxy_http_version 1.1;

        # SSE requirements
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;

        # Forward real client IP so the API rate-limiter sees the correct address
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
