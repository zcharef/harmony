# cargo-deny configuration for harmony-app/src-tauri
# https://embarkstudios.github.io/cargo-deny/
#
# Run: cargo deny check

[graph]
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
]

# ============================================================================
# ADVISORIES - Check for known security vulnerabilities
# ============================================================================
[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
# WHY: Tauri's transitive tree includes many unmaintained GTK3/unic crates
# that we cannot fix (upstream Tauri responsibility). Warn instead of fail.
unmaintained = "warn"
unsound = "warn"
yanked = "deny"
ignore = []

# ============================================================================
# LICENSES - Ensure all dependencies have acceptable licenses
# ============================================================================
[licenses]
confidence-threshold = 0.8
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "MPL-2.0",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "BSL-1.0",
    "0BSD",
    "CDLA-Permissive-2.0",
]

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[[licenses.clarify]]
name = "webpki"
expression = "ISC"
license-files = [{ path = "LICENSE", hash = 0x001c7e6c }]

[licenses.private]
ignore = true
registries = []

# ============================================================================
# BANS - Deny specific crates or features
# ============================================================================
[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"

deny = [
    { name = "openssl", wrappers = ["openssl-sys", "native-tls"] },
    { name = "failure" },
    { name = "error-chain" },
    { name = "rust-crypto" },
]

skip = []
skip-tree = []

# ============================================================================
# SOURCES - Ensure dependencies come from trusted sources
# ============================================================================
[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]

[sources.allow-org]
github = []
